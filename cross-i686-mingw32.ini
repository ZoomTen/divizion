[binaries]
c           = 'i686-w64-mingw32-gcc'
cpp         = 'i686-w64-mingw32-g++'
ar          = 'i686-w64-mingw32-ar'
strip       = 'i686-w64-mingw32-strip'
windres     = 'i686-w64-mingw32-windres'
exe_wrapper = 'wine'

[host_machine]
system     = 'windows'
cpu_family = 'x86'
cpu        = 'i686'
endian     = 'little'

[cmake]
CMAKE_SYSTEM_NAME = 'Windows'
CMAKE_SYSTEM_PROCESSOR = 'x86'
# which compilers to use for C and C++
CMAKE_C_COMPILER = 'i686-w64-mingw32-gcc'
CMAKE_CXX_COMPILER = 'i686-w64-mingw32-g++'
CMAKE_RC_COMPILER = 'i686-w64-mingw32-windres'
# here is the target environment located
#CMAKE_FIND_ROOT_PATH = '/usr/i686-w64-mingw32/sys-root/mingw'
CMAKE_FIND_ROOT_PATH_MODE_PROGRAM = 'NEVER'
CMAKE_FIND_ROOT_PATH_MODE_LIBRARY = 'ONLY'
CMAKE_FIND_ROOT_PATH_MODE_INCLUDE = 'ONLY'

; The MinGW cross compiler resolves its own sysroot automatically;
; CMAKE_C/CXX_IMPLICIT_INCLUDE_DIRECTORIES has no direct Meson counterpart.
; If pkg-config is needed for the target:
; pkg_config_libdir = '/usr/i686-w64-mingw32/lib/pkgconfig'